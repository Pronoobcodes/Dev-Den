{% extends "blogApp/main.html" %}

{% block content %}
<main class="inbox-page">
  <div class="inbox-wrap">
    <h2 class="inbox-title">Messages</h2>

    {% for conv in conversations %}
      <a href="{% url 'private-messages' conv.user.username %}" class="conv-row">
        <div class="conv-avatar">
          <img src="{{ conv.user.avatar_url }}" alt="{{ conv.user.username }}">
        </div>
        <div class="conv-body">
          <span class="conv-name">{{ conv.user.username }}</span>
          <span class="conv-last">{{ conv.last_message|truncatechars:45 }}</span>
        </div>
      </a>
    {% empty %}
      <p class="conv-empty">No messages yet.</p>
    {% endfor %}
  </div>
</main>

<style>
.inbox-page {
  margin-top: 2.4rem;
}

.inbox-wrap {
  max-width: 48rem;
  margin: 0 auto;
  background: var(--color-dark);
  border-radius: 0.7rem;
  overflow: hidden;
}

.inbox-title {
  padding: 1.6rem 2rem;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--color-light);
  border-bottom: 1px solid var(--color-dark-medium);
}

.conv-row {
  display: flex;
  align-items: center;
  gap: 1.4rem;
  padding: 1.2rem 2rem;
  text-decoration: none;
  border-bottom: 1px solid var(--color-dark-medium);
  transition: background 0.15s ease;
}

.conv-row:hover {
  background: var(--color-dark-medium);
}

.conv-avatar img {
  width: 4.4rem;
  height: 4.4rem;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.conv-body {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  overflow: hidden;
}

.conv-name {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--color-light);
}

.conv-last {
  font-size: 1.3rem;
  color: var(--color-gray);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.conv-empty {
  padding: 2rem;
  color: var(--color-gray);
  font-size: 1.4rem;
  text-align: center;
}
</style>
{% endblock content %}
